name: Build Windows release asset

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build and upload to
        required: true
        type: string

permissions:
  contents: write

jobs:
  windows:
    name: Build unsigned Windows app
    runs-on: windows-latest

    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}

    steps:
      - name: Check out release source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build dependencies
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build unsigned Windows app
        shell: pwsh
        run: .\scripts\build.ps1 -Python python -SkipSigning

      - name: Package release asset
        shell: pwsh
        run: |
          $archive = "PasteKeyboard-windows.zip"
          Remove-Item -LiteralPath $archive -Force -ErrorAction SilentlyContinue
          if (-not (Test-Path -LiteralPath "dist\PasteKeyboard.exe")) {
            throw "Missing expected build output: dist\PasteKeyboard.exe"
          }
          if (-not (Test-Path -LiteralPath "dist\PasteKeyboard-Anleitung.pdf")) {
            throw "Missing expected documentation output: dist\PasteKeyboard-Anleitung.pdf"
          }
          if (-not (Test-Path -LiteralPath "dist\PasteKeyboard-Guide.pdf")) {
            throw "Missing expected documentation output: dist\PasteKeyboard-Guide.pdf"
          }
          Compress-Archive `
            -Path "dist\PasteKeyboard.exe", "dist\PasteKeyboard-Anleitung.pdf", "dist\PasteKeyboard-Guide.pdf" `
            -DestinationPath $archive
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          [System.IO.Compression.ZipFile]::OpenRead((Resolve-Path $archive)).Entries |
            ForEach-Object { "{0} {1}" -f $_.FullName, $_.Length }

      - name: Upload asset to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$env:RELEASE_TAG" PasteKeyboard-windows.zip --repo "$env:GITHUB_REPOSITORY" --clobber
