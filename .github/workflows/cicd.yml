name: CI/CD

on:
  push:
  pull_request:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install PyInstaller
        run: python -m pip install pyinstaller

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Build executable
        run: python -m PyInstaller --noconfirm --clean --onefile --windowed --paths src --name PasteKeyboard main.py

      - name: Package Windows artifact
        run: Compress-Archive -Path dist/PasteKeyboard.exe -DestinationPath dist/PasteKeyboard-windows.zip -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: PasteKeyboard-windows
          path: dist/PasteKeyboard-windows.zip
          if-no-files-found: error

      - name: Upload release asset
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/PasteKeyboard-windows.zip --clobber
