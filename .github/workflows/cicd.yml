name: CI/CD

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: python -m pip install pyinstaller

      - name: Build executable and guides
        shell: pwsh
        run: .\scripts\build.ps1 -Python python -SkipSigning

      - name: Package Windows artifact
        shell: pwsh
        run: Compress-Archive -Path dist\PasteKeyboard.exe, dist\PasteKeyboard-Anleitung.pdf, dist\PasteKeyboard-Guide.pdf -DestinationPath dist\PasteKeyboard-windows.zip -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: PasteKeyboard-windows
          path: dist/PasteKeyboard-windows.zip
          if-no-files-found: error
